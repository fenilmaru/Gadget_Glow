{% extends 'base.html' %}
{% load static %}
{% block title %}{{ title }} - Gadget Glow{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="rounded-3 p-4" style="background:var(--bg-card);border:1px solid var(--border)">
        <h4 class="fw-bold mb-4"><i class="bi bi-box me-2" style="color:var(--primary-light)"></i>{{ title }}</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label fw-semibold">Product Name</label>
              <input type="text" name="name" class="form-control" value="{{ product.name|default:'' }}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Price ($)</label>
              <input type="number" name="price" class="form-control" step="0.01" value="{{ product.price|default:'' }}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Product Image</label>
              <input type="file" name="image" class="form-control" accept="image/*" {% if not product %}required{% endif %}>
              {% if product and product.image %}
              <div class="mt-2 d-flex align-items-center gap-2">
                <img src="{{ product.image.url }}" alt="Current image" style="width:60px;height:60px;object-fit:contain;border-radius:6px;background:var(--bg-surface);padding:4px">
                <small class="text-muted">Current image</small>
              </div>
              {% endif %}
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Compare Price ($)</label>
              <input type="number" name="compare_price" class="form-control" step="0.01" value="{{ product.compare_price|default:'' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Stock</label>
              <input type="number" name="stock" class="form-control" value="{{ product.stock|default:'0' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Category</label>
              <select name="category" class="form-select" required>
                <option value="">-- Select --</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Brand</label>
              <select name="brand" class="form-select">
                <option value="">-- None --</option>
                {% for b in brands %}
                <option value="{{ b.id }}" {% if product.brand_id == b.id %}selected{% endif %}>{{ b.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Description</label>
              <textarea name="description" class="form-control" rows="4">{{ product.description|default:'' }}</textarea>
            </div>
            <div class="col-md-6">
              <div class="form-check">
                <input type="checkbox" name="is_featured" class="form-check-input" id="isFeatured" {% if product.is_featured %}checked{% endif %}>
                <label class="form-check-label" for="isFeatured">Featured Product</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if product.is_active or not product %}checked{% endif %}>
                <label class="form-check-label" for="isActive">Active</label>
              </div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-gradient"><i class="bi bi-check-lg me-1"></i>Save Product</button>
            <a href="{% url 'admin_products' %}" class="btn btn-outline-glow">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
