{% extends 'base.html' %}
{% load static %}
{% block title %}Login - Gadget Glow{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="p-4 p-md-5 rounded-4" style="background: var(--bg-card); border: 1px solid var(--border);">
                <div class="text-center mb-4">
                    <i class="bi bi-lightning-charge-fill" style="color: var(--primary-light); font-size: 2.5rem;"></i>
                    <h3 class="fw-bold mt-2">Welcome Back</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Username</label>
                        <input type="text" name="username" class="form-control bg-dark text-light border-secondary" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-light border-secondary" placeholder="Enter your password" required>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger py-2 small">{{ error }}</div>
                    {% endif %}
                    <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold mt-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted small">Don't have an account?</span>
                    <a href="{% url 'register' %}" class="text-decoration-none small fw-semibold" style="color: var(--primary);"> Create one</a>
                </div>
                <div class="text-center mt-2">
                    <small class="text-muted">Demo: <strong>demo</strong> / <strong>demo123</strong></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
