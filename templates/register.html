{% extends 'base.html' %}
{% load static %}
{% block title %}Register - Gadget Glow{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="p-4 p-md-5 rounded-4" style="background: var(--bg-card); border: 1px solid var(--border);">
                <div class="text-center mb-4">
                    <i class="bi bi-lightning-charge-fill" style="color: var(--primary-light); font-size: 2.5rem;"></i>
                    <h3 class="fw-bold mt-2">Create Account</h3>
                    <p class="text-muted">Join Gadget Glow today</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">First Name</label>
                            <input type="text" name="first_name" class="form-control bg-dark text-light border-secondary" placeholder="John">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">Last Name</label>
                            <input type="text" name="last_name" class="form-control bg-dark text-light border-secondary" placeholder="Doe">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">Username *</label>
                            <input type="text" name="username" class="form-control bg-dark text-light border-secondary" placeholder="johndoe" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">Email *</label>
                            <input type="email" name="email" class="form-control bg-dark text-light border-secondary" placeholder="john@example.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">Phone</label>
                            <input type="text" name="phone" class="form-control bg-dark text-light border-secondary" placeholder="+1 234 567 890">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">Role</label>
                            <select name="role" class="form-select bg-dark text-light border-secondary">
                                <option value="user">Customer</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">Password *</label>
                            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" placeholder="Min 8 characters" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold text-muted">Confirm Password *</label>
                            <input type="password" name="confirm_password" class="form-control bg-dark text-light border-secondary" placeholder="Repeat password" required>
                        </div>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger py-2 small mt-3">{{ error }}</div>
                    {% endif %}
                    <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold mt-3">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted small">Already have an account?</span>
                    <a href="{% url 'login' %}" class="text-decoration-none small fw-semibold" style="color: var(--primary);"> Sign in</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
