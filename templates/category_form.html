{% extends 'base.html' %}
{% load static %}
{% block title %}{{ title }} - Gadget Glow{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="rounded-3 p-4" style="background:var(--bg-card);border:1px solid var(--border)">
        <h4 class="fw-bold mb-4"><i class="bi bi-grid me-2" style="color:var(--primary-light)"></i>{{ title }}</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Category Name</label>
            <input type="text" name="name" class="form-control" value="{{ category.name|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ category.description|default:'' }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Category Image</label>
            <input type="file" name="image" class="form-control" accept="image/*">
            {% if category and category.image %}
            <div class="mt-2 d-flex align-items-center gap-2">
              <img src="{{ category.image.url }}" alt="Current image" style="width:60px;height:60px;object-fit:contain;border-radius:6px;background:var(--bg-surface);padding:4px">
              <small class="text-muted">Current image</small>
            </div>
            {% elif category %}
            <div class="mt-2 d-flex align-items-center gap-2">
              <img src="{{ category.get_image_url }}" alt="Default image" style="width:60px;height:60px;object-fit:contain;border-radius:6px;background:var(--bg-surface);padding:4px">
              <small class="text-muted">Online image (upload to override)</small>
            </div>
            {% endif %}
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if category.is_active or not category %}checked{% endif %}>
            <label class="form-check-label" for="isActive">Active</label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-gradient"><i class="bi bi-check-lg me-1"></i>Save</button>
            <a href="{% url 'admin_categories' %}" class="btn btn-outline-glow">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
