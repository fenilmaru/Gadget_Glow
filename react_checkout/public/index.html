<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="description" content="Gadget Glow - Premium Futuristic Checkout" />
  <title>Checkout - Gadget Glow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            glow: {
              indigo: '#6366f1',
              purple: '#8b5cf6',
              blue: '#3b82f6',
              cyan: '#06b6d4',
              pink: '#ec4899',
              dark: '#0a0a1a',
              darker: '#060612',
              card: '#111122',
              border: '#1e1e3a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          animation: {
            'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
            'shimmer': 'shimmer 3s linear infinite',
            'scan-line': 'scan-line 2s linear infinite',
            'breathe': 'breathe 4s ease-in-out infinite',
            'countdown-pulse': 'countdown-pulse 1s ease-in-out infinite',
            'success-pop': 'success-pop 0.5s ease-out forwards',
            'slide-up': 'slide-up 0.5s ease-out forwards',
            'fade-in': 'fade-in 0.5s ease-out forwards',
            'spin-slow': 'spin 3s linear infinite',
            'draw-check': 'draw-check 1s ease-in-out 0.5s forwards',
            'draw-circle': 'draw-circle 0.8s ease-in-out forwards',
            'particle-fall': 'particle-fall 3s ease-in-out infinite',
            'qr-scan': 'qr-scan 2s ease-in-out infinite',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  </style>
</head>
<body class="bg-glow-dark text-gray-100 antialiased">
  <div id="root"></div>
</body>
</html>
